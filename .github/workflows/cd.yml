name: Backend CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Backend/**'
      - 'client/**' # Sửa từ Frontend thành client cho khớp với hình của bạn

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./Backend # CỰC KỲ QUAN TRỌNG: Trỏ vào folder Backend
        file: ./Backend/Dockerfile # Đường dẫn đến file Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

    - name: Trigger Render Deploy
      run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}