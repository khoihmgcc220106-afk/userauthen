name: Backend CD Pipeline

on:
  push:
    branches: [ "main" ]
    # Chỉ chạy khi có thay đổi trong code Backend
    paths:
      - 'Backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        # Nhảy vào folder Backend để lấy code và Dockerfile
        context: ./Backend 
        file: ./Backend/Dockerfile 
        push: true
        # Đảm bảo tên Image này khớp với tên bạn khai báo trên Render (Docker Image Name)
        tags: ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

    - name: Trigger Render Deploy
      # Chỉ chạy bước này nếu Secret RENDER_DEPLOY_HOOK đã được cấu hình
      if: success()
      run: |
        if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
          echo "❌ Error: RENDER_DEPLOY_HOOK is missing in GitHub Secrets!"
          exit 1
        fi
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}